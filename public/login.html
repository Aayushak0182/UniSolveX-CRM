<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniSolveX CRM | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f3f4f6; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
        <h2 class="text-2xl font-bold text-center text-indigo-700 mb-6">UniSolveX CRM Login</h2>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                <input id="username" type="text" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <input id="password" type="password" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700 transition">Login</button>
        </form>
        <p id="loginError" class="text-red-500 text-sm mt-4 text-center hidden">Invalid username or password.</p>
    </div>
    <script>
        const allowedAgents = {
            Aayush: '220416',
            Reya: '123456'
        };

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const isValidUser = Object.prototype.hasOwnProperty.call(allowedAgents, username);
            const isValidPassword = isValidUser && allowedAgents[username] === password;

            if (isValidPassword) {
                localStorage.setItem('agentName', username);
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('loginError').classList.remove('hidden');
        };
    </script>
</body>
</html>
