<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Expert</title>
    <style>
        :root {
            --bg: #f5efe6;
            --panel: rgba(255,255,255,0.93);
            --text: #1f2937;
            --muted: #6b7280;
            --border: rgba(148,163,184,0.25);
            --brand: #7c3aed;
            --brand-soft: rgba(124,58,237,0.08);
        }
        html[data-theme="dark"] {
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.92);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(148,163,184,0.25);
            --brand: #93c5fd;
            --brand-soft: rgba(96,165,250,0.12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Segoe UI, Arial, sans-serif;
            background: linear-gradient(180deg, #f7f1e7, #f2eadf);
            color: var(--text);
        }
        .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            margin-bottom: 18px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px 18px;
        }
        .label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 6px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 110px; resize: vertical; }
        .meta {
            margin-top: 8px;
            color: var(--muted);
            font-size: 14px;
        }
        .full { grid-column: 1 / -1; }
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .chip {
            border-radius: 999px;
            padding: 6px 10px;
            background: var(--brand-soft);
            color: var(--brand);
            font-weight: 700;
            font-size: 12px;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 18px;
        }
        button {
            border: 0;
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .primary { background: var(--brand); color: #fff; }
        .secondary { background: var(--brand-soft); color: var(--brand); }
        @media (max-width: 760px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="panel">
            <div class="topbar">
                <div>
                    <h1 style="margin:0;">Manage Expert</h1>
                    <p id="pageMeta" class="meta">Loading order details...</p>
                </div>
                <button class="secondary" onclick="window.close()">Close</button>
            </div>
        </div>

        <div class="panel">
            <div class="grid">
                <div>
                    <label class="label" for="assignedExpertName">Assigned Expert Name</label>
                    <input id="assignedExpertName" type="text" placeholder="Expert name">
                </div>
                <div>
                    <label class="label" for="assignedExpertId">Assigned Expert ID</label>
                    <input id="assignedExpertId" type="text" placeholder="USXT0001">
                </div>
                <div>
                    <label class="label" for="expertPayout">Expert Payout</label>
                    <input id="expertPayout" type="text" placeholder="INR 1000">
                </div>
                <div>
                    <label class="label" for="expertPaymentStatus">Expert Payment Status</label>
                    <select id="expertPaymentStatus">
                        <option value="pending">Pending</option>
                        <option value="partial">Partially Done</option>
                        <option value="complete">Fully Done</option>
                    </select>
                </div>
                <div class="full">
                    <label class="label" for="interestedExperts">Interested Experts</label>
                    <textarea id="interestedExperts" placeholder="Add expert names or IDs, one per line"></textarea>
                </div>
                <div class="full">
                    <label class="label" for="expertNotes">Expert Notes</label>
                    <textarea id="expertNotes" placeholder="Add notes about the expert, assignment, or handoff"></textarea>
                </div>
            </div>
            <div style="margin-top:18px;">
                <span class="label">Already Notified Experts</span>
                <div id="notifiedExpertsList" class="chips"></div>
            </div>
            <div class="actions">
                <button class="secondary" type="button" onclick="window.close()">Close</button>
                <button class="primary" id="saveBtn" type="button">Save</button>
            </div>
            <p id="saveStatus" class="meta"></p>
        </div>
    </div>

    <script>
        const APP_THEME_STORAGE_KEY = 'unisolvex_theme_v1';
        const orderId = new URLSearchParams(window.location.search).get('orderId') || '';
        const clientId = new URLSearchParams(window.location.search).get('clientId') || '';

        function applyTheme() {
            const theme = localStorage.getItem(APP_THEME_STORAGE_KEY) || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        }

        function getBackendBase() {
            const hasHttpOrigin = /^https?:\/\//i.test(window.location.origin || '');
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || !hasHttpOrigin) {
                return 'http://localhost:3001';
            }
            return 'https://unisolvex-crm-backend-ra02.onrender.com';
        }

        function getContainerFromHtml(html) {
            const container = document.createElement('div');
            container.innerHTML = String(html || '');
            return container;
        }

        async function getContainer() {
            let response;
            try {
                response = await fetch(getBackendBase() + '/api/crm/state');
            } catch (error) {
                throw new Error('Backend unreachable. Cloud expert data is required.');
            }
            const data = await response.json().catch(() => ({}));
            const state = data?.state && typeof data.state === 'object' ? data.state : data;
            if (!response.ok || typeof state?.orderListHtml !== 'string') {
                throw new Error('Expert data could not be loaded from cloud.');
            }
            return getContainerFromHtml(state.orderListHtml);
        }

        function findCard(container) {
            return Array.from(container.querySelectorAll('.order-card')).find((card) => {
                const currentOrderId = String(card.querySelector('.order-id')?.textContent || '').replace('#', '').trim();
                return currentOrderId === orderId;
            }) || null;
        }

        function parseJsonArray(raw) {
            try {
                const parsed = JSON.parse(String(raw || '[]'));
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function saveContainer(container) {
            let response;
            try {
                response = await fetch(getBackendBase() + '/api/crm/state', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderListHtml: container.innerHTML })
                });
            } catch (error) {
                throw new Error('Backend unreachable. Changes were not saved to cloud.');
            }
            if (!response.ok) {
                throw new Error('Cloud save failed.');
            }
        }

        async function render() {
            applyTheme();
            const meta = document.getElementById('pageMeta');
            try {
                const container = await getContainer();
                const card = findCard(container);
                if (!card) {
                    if (meta) meta.textContent = 'Order not found.';
                    return;
                }
                const title = card.querySelector('.order-title')?.textContent?.trim() || 'Order';
                meta.textContent = `${title} | Order #${orderId} | Client ${clientId || card.dataset.clientId || '-'}`;
                document.getElementById('assignedExpertName').value = card.dataset.assignedExpertName || '';
                document.getElementById('assignedExpertId').value = card.dataset.assignedExpertId || '';
                document.getElementById('expertPayout').value = card.dataset.expertPayout || '';
                document.getElementById('expertPaymentStatus').value = card.dataset.expertPaymentStatus || 'pending';
                document.getElementById('interestedExperts').value = parseJsonArray(card.dataset.interestedExperts || '[]').join('\n');
                document.getElementById('expertNotes').value = card.dataset.expertNotes || '';
                const notified = parseJsonArray(card.dataset.notifiedExperts || '[]');
                document.getElementById('notifiedExpertsList').innerHTML = notified.length
                    ? notified.map((item) => `<span class="chip">${escapeHtml(item)}</span>`).join('')
                    : '<span class="meta">No experts notified yet.</span>';
                document.getElementById('saveStatus').textContent = '';
            } catch (error) {
                if (meta) meta.textContent = error?.message || 'Backend unreachable.';
                document.getElementById('saveStatus').textContent = error?.message || 'Backend unreachable.';
            }
        }

        document.getElementById('saveBtn').addEventListener('click', async function() {
            try {
                const container = await getContainer();
                const card = findCard(container);
                if (!card) return;
                card.dataset.assignedExpertName = String(document.getElementById('assignedExpertName').value || '').trim();
                card.dataset.assignedExpertId = String(document.getElementById('assignedExpertId').value || '').trim();
                card.dataset.expertPayout = String(document.getElementById('expertPayout').value || '').trim();
                card.dataset.expertPaymentStatus = String(document.getElementById('expertPaymentStatus').value || 'pending').trim() || 'pending';
                card.dataset.interestedExperts = JSON.stringify(
                    String(document.getElementById('interestedExperts').value || '')
                        .split(/\r?\n|,/)
                        .map((item) => item.trim())
                        .filter(Boolean)
                );
                card.dataset.expertNotes = String(document.getElementById('expertNotes').value || '').trim();
                const payoutEl = card.querySelector('.order-expert-pay');
                if (payoutEl) payoutEl.textContent = card.dataset.expertPayout || 'INR 0';
                await saveContainer(container);
                document.getElementById('saveStatus').textContent = 'Saved successfully.';
            } catch (error) {
                document.getElementById('saveStatus').textContent = error?.message || 'Save failed.';
                alert(error?.message || 'Save failed.');
            }
        });

        void render();
    </script>
</body>
</html>
