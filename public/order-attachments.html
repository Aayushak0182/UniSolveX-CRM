<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Files</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5efe6;
            --panel: rgba(255,255,255,0.94);
            --text: #1f2937;
            --muted: #6b7280;
            --border: rgba(148, 163, 184, 0.24);
            --brand: #4f46e5;
            --brand-soft: rgba(79, 70, 229, 0.08);
            --success: #059669;
        }
        html[data-theme="dark"] {
            color-scheme: dark;
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.9);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.22);
            --brand: #93c5fd;
            --brand-soft: rgba(96, 165, 250, 0.12);
            --success: #86efac;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Segoe UI, Arial, sans-serif;
            background: linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 86%, #ffffff));
            color: var(--text);
        }
        .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }
        .hero {
            padding: 24px;
            margin-bottom: 18px;
        }
        .hero-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }
        .hero h1, .hero p { margin: 0; }
        .meta {
            margin-top: 8px;
            color: var(--muted);
            font-size: 14px;
        }
        .layout {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr) 320px;
            gap: 18px;
        }
        .sidebar, .content, .uploader {
            padding: 20px;
        }
        .folder-card {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.78);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }
        html[data-theme="dark"] .folder-card {
            background: rgba(15, 23, 42, 0.62);
        }
        .folder-card.is-active {
            border-color: rgba(79, 70, 229, 0.4);
            background: var(--brand-soft);
        }
        .breadcrumbs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .breadcrumbs button {
            border: 0;
            background: transparent;
            color: inherit;
            padding: 0;
            cursor: pointer;
        }
        .file-list {
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }
        .file-item {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.82);
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }
        html[data-theme="dark"] .file-item {
            background: rgba(15, 23, 42, 0.62);
        }
        .file-item small {
            display: block;
            color: var(--muted);
            margin-top: 6px;
            word-break: break-word;
        }
        .dropzone {
            border: 1.5px dashed var(--border);
            border-radius: 20px;
            min-height: 230px;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 22px;
            background: rgba(255,255,255,0.68);
            cursor: pointer;
        }
        html[data-theme="dark"] .dropzone {
            background: rgba(15, 23, 42, 0.5);
        }
        .dropzone.is-dragover {
            border-color: rgba(79, 70, 229, 0.5);
            background: var(--brand-soft);
        }
        .dropzone h3, .dropzone p { margin: 0; }
        .dropzone p { margin-top: 6px; color: var(--muted); }
        .top-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn {
            border: 0;
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-soft { background: var(--brand-soft); color: var(--brand); }
        .empty {
            border: 1px dashed var(--border);
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            color: var(--muted);
        }
        .status {
            margin-top: 10px;
            color: var(--success);
            font-size: 13px;
            font-weight: 700;
        }
        .upload-queue {
            position: fixed;
            bottom: 16px;
            right: 16px;
            width: min(320px, calc(100vw - 32px));
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .upload-queue-item {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 12px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.12);
        }
        .upload-queue-name {
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .upload-queue-meta {
            margin-top: 4px;
            font-size: 11px;
            color: var(--muted);
        }
        .upload-progress-bar {
            margin-top: 8px;
            width: 100%;
            height: 6px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.18);
            overflow: hidden;
        }
        .upload-progress-bar > span {
            display: block;
            height: 100%;
            background: var(--brand);
            width: 0%;
            transition: width 140ms ease;
        }
        a { color: var(--brand); }
        .file-item-main {
            min-width: 0;
            flex: 1;
        }
        .file-item-title {
            font-weight: 700;
            font-size: 13px;
        }
        .file-item-link {
            display: block;
            margin-top: 6px;
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-item-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .icon-btn svg {
            width: 16px;
            height: 16px;
        }
        @media (max-width: 980px) {
            .layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="uploadQueue" class="upload-queue"></div>
        <div class="panel hero">
            <div class="hero-top">
                <div>
                    <h1>Order Files</h1>
                    <p id="pageMeta" class="meta">Loading order details...</p>
                    <p id="saveStatus" class="status"></p>
                </div>
                <div class="top-actions">
                    <button class="btn btn-soft" type="button" id="newFolderBtn">New Folder</button>
                    <button class="btn btn-soft" type="button" onclick="window.close()">Close</button>
                </div>
            </div>
        </div>

        <div class="layout">
            <div class="panel sidebar">
                <div id="folderTree"></div>
            </div>
            <div class="panel content">
                <div id="breadcrumbs" class="breadcrumbs"></div>
                <div id="fileList" class="file-list"></div>
            </div>
            <div class="panel uploader">
                <label id="dropzone" class="dropzone" for="fileInput">
                    <div>
                        <h3>Drag & drop files here</h3>
                        <p>or click to select a file</p>
                        <p id="uploadHint" class="meta" style="margin-top:10px;">Choose a folder first.</p>
                    </div>
                </label>
                <input id="fileInput" type="file" class="hidden" style="display:none;">
            </div>
        </div>
    </div>

    <script>
        const APP_THEME_STORAGE_KEY = 'unisolvex_theme_v1';
        const orderId = new URLSearchParams(window.location.search).get('orderId') || '';
        const clientId = new URLSearchParams(window.location.search).get('clientId') || '';
        const activePath = [];
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');

        function applyTheme() {
            const theme = localStorage.getItem(APP_THEME_STORAGE_KEY) || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function parseJsonArray(raw) {
            try {
                const parsed = JSON.parse(String(raw || '[]'));
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function getContainerFromHtml(html) {
            const container = document.createElement('div');
            container.innerHTML = String(html || '');
            return container;
        }

        function findCard(container) {
            return Array.from(container.querySelectorAll('.order-card')).find((card) => {
                const currentOrderId = String(card.querySelector('.order-id')?.textContent || '').replace('#', '').trim();
                return currentOrderId === orderId;
            }) || null;
        }

        function getBackendBase() {
            const hasHttpOrigin = /^https?:\/\//i.test(window.location.origin || '');
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || !hasHttpOrigin) {
                return 'http://localhost:3001';
            }
            return 'https://unisolvex-crm-backend-ra02.onrender.com';
        }

        async function fetchCrmStateHtml() {
            let response;
            try {
                response = await fetch(getBackendBase() + '/api/crm/state');
            } catch (error) {
                throw new Error('Backend unreachable. Cloud storage is required.');
            }
            const data = await response.json().catch(() => ({}));
            const state = data?.state && typeof data.state === 'object' ? data.state : data;
            if (!response.ok || typeof state?.orderListHtml !== 'string') {
                throw new Error('CRM state could not be loaded from cloud.');
            }
            return state.orderListHtml;
        }

        async function loadContainer() {
            return getContainerFromHtml(await fetchCrmStateHtml());
        }

        async function saveContainer(container, message) {
            document.getElementById('saveStatus').textContent = message || 'Saved successfully.';
            let response;
            try {
                response = await fetch(getBackendBase() + '/api/crm/state', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderListHtml: container.innerHTML })
                });
            } catch (error) {
                throw new Error('Backend unreachable. Changes were not saved to cloud.');
            }
            if (!response.ok) {
                throw new Error('Cloud save failed.');
            }
        }

        function getCurrentPathKey() {
            return activePath.join('/');
        }

        function getPathLabel(pathKey) {
            if (!pathKey) return 'Root';
            return pathKey
                .split('/')
                .filter(Boolean)
                .map((part) => part === 'expert' ? 'Expert' : part === 'user' ? 'User' : part === 'task' ? 'Task' : part)
                .join(' / ');
        }

        function getCustomFolders(card) {
            return parseJsonArray(card?.dataset?.customOrderFolders || '[]')
                .map((row) => ({
                    name: String(row?.name || '').trim(),
                    parentPath: String(row?.parentPath || '').trim(),
                    path: String(row?.path || '').trim()
                }))
                .filter((row) => row.name && row.path);
        }

        function setCustomFolders(card, rows) {
            if (!card) return;
            card.dataset.customOrderFolders = JSON.stringify(Array.isArray(rows) ? rows : []);
        }

        function getCustomFiles(card) {
            return parseJsonArray(card?.dataset?.customOrderFiles || '[]')
                .map((row) => ({
                    path: String(row?.path || '').trim(),
                    name: String(row?.name || '').trim(),
                    url: String(row?.url || '').trim(),
                    addedAt: String(row?.addedAt || '').trim()
                }))
                .filter((row) => row.path && row.name && row.url);
        }

        function setCustomFiles(card, rows) {
            if (!card) return;
            card.dataset.customOrderFiles = JSON.stringify(Array.isArray(rows) ? rows : []);
        }

        function getChildFolders(card, pathKey) {
            const customFolders = getCustomFolders(card).filter((row) => row.parentPath === pathKey);
            const fixedFolders = [];
            if (!pathKey) {
                fixedFolders.push({ name: 'Expert', path: 'expert', fixed: true });
                fixedFolders.push({ name: 'User', path: 'user', fixed: true });
            }
            if (pathKey === 'expert') {
                fixedFolders.push({ name: 'Task', path: 'expert/task', fixed: true });
            }
            return [
                ...fixedFolders,
                ...customFolders.map((row) => ({ name: row.name, path: row.path, fixed: false }))
            ];
        }

        function getFilesForPath(card, pathKey) {
            if (!card) return [];
            if (pathKey === 'expert/task') {
                return parseJsonArray(card.dataset.questionAttachments || '[]');
            }
            if (pathKey === 'user') {
                return parseJsonArray(card.dataset.solutionAttachments || '[]');
            }
            return getCustomFiles(card).filter((row) => row.path === pathKey);
        }

        function isUploadAllowed(pathKey) {
            return Boolean(pathKey) && pathKey !== 'expert';
        }

        function setActivePath(nextPath) {
            activePath.length = 0;
            activePath.push(...nextPath);
            render();
        }

        function buildBreadcrumbs() {
            const rows = ['Root', ...activePath.map((part) => getPathLabel(part).split(' / ').pop() || part)];
            const container = document.getElementById('breadcrumbs');
            container.innerHTML = rows.map((part, index) => {
                return `
                    <button type="button" data-breadcrumb-index="${index}">${escapeHtml(part)}</button>
                    ${index < rows.length - 1 ? '<span>/</span>' : ''}
                `;
            }).join('');
            Array.from(container.querySelectorAll('[data-breadcrumb-index]')).forEach((btn) => {
                btn.addEventListener('click', () => {
                    const index = Number(btn.dataset.breadcrumbIndex);
                    if (!Number.isFinite(index)) return;
                    setActivePath(activePath.slice(0, Math.max(0, index - 1)));
                });
            });
        }

        function renderFolderTree(container) {
            const card = findCard(container);
            const tree = document.getElementById('folderTree');
            const topLevel = card ? getChildFolders(card, '') : [];
            tree.innerHTML = topLevel.map((folder) => {
                const rootSegment = String(folder.path || '').split('/')[0] || '';
                const isActive = activePath[0] === rootSegment;
                return `
                    <div class="folder-card ${isActive ? 'is-active' : ''}" data-folder-root="${escapeHtml(folder.path)}">
                        <strong>${escapeHtml(folder.name)}</strong>
                        <span>&rsaquo;</span>
                    </div>
                `;
            }).join('');
            Array.from(tree.querySelectorAll('[data-folder-root]')).forEach((node) => {
                node.addEventListener('click', () => {
                    const key = String(node.dataset.folderRoot || '').trim();
                    setActivePath(key ? key.split('/').filter(Boolean) : []);
                });
            });
        }

        function renderFileList(container) {
            const card = findCard(container);
            const target = document.getElementById('fileList');
            const pathKey = getCurrentPathKey();
            if (!card) {
                target.innerHTML = '<div class="empty">Order not found.</div>';
                return;
            }
            if (!activePath.length) {
                target.innerHTML = '<div class="empty">Choose or create a folder from the left side.</div>';
                return;
            }

            const childFolders = getChildFolders(card, pathKey);
            const items = getFilesForPath(card, pathKey);
            const folderHtml = childFolders.map((folder) => `
                <div class="folder-card" data-folder-path="${escapeHtml(folder.path)}">
                    <strong>${escapeHtml(folder.name)}</strong>
                    <span>&rsaquo;</span>
                </div>
            `).join('');
            const fileHtml = items.map((item, index) => `
                <div class="file-item">
                    <div class="file-item-main">
                        <div class="file-item-title">${escapeHtml(item.name || 'Untitled')}</div>
                        <a class="file-item-link" href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(item.url || '')}">${escapeHtml(item.url || 'Open file')}</a>
                    </div>
                    <div class="file-item-actions">
                        <a class="btn btn-soft icon-btn" href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener noreferrer" title="Download">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
                        </a>
                        <button class="btn btn-soft icon-btn" type="button" onclick="removeItem(${index})" title="Remove">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');

            target.innerHTML = folderHtml + fileHtml || '<div class="empty">No files or folders here yet.</div>';
            Array.from(target.querySelectorAll('[data-folder-path]')).forEach((nodeEl) => {
                nodeEl.addEventListener('click', () => {
                    const path = String(nodeEl.dataset.folderPath || '').trim();
                    setActivePath(path ? path.split('/').filter(Boolean) : []);
                });
            });
            if (!childFolders.length && !items.length) {
                target.innerHTML = '<div class="empty">No files or folders here yet.</div>';
            }
        }

        function refreshMeta(container) {
            const card = findCard(container);
            const meta = document.getElementById('pageMeta');
            if (!card) {
                meta.textContent = 'Order not found.';
                return;
            }
            const title = card.querySelector('.order-title')?.textContent?.trim() || 'Order';
            meta.textContent = `${title} | Order #${orderId} | Client ${clientId || card.dataset.clientId || '-'}`;
        }

        function updateUploadHint() {
            const hint = document.getElementById('uploadHint');
            const pathKey = getCurrentPathKey();
            hint.textContent = isUploadAllowed(pathKey)
                ? `Upload files into ${getPathLabel(pathKey)}.`
                : 'Open or create a file folder first.';
        }

        async function fileToDataUrl(file) {
            return await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsDataURL(file);
            });
        }

        function ensureUploadQueueItem(fileName) {
            const queue = document.getElementById('uploadQueue');
            const id = 'upload-' + Math.random().toString(36).slice(2);
            const item = document.createElement('div');
            item.className = 'upload-queue-item';
            item.dataset.uploadId = id;
            item.innerHTML = `
                <div class="upload-queue-name">${escapeHtml(fileName)}</div>
                <div class="upload-queue-meta">Preparing upload...</div>
                <div class="upload-progress-bar"><span></span></div>
            `;
            queue.appendChild(item);
            return item;
        }

        function updateUploadQueueItem(item, percent, metaText) {
            if (!item) return;
            item.querySelector('.upload-queue-meta').textContent = metaText;
            item.querySelector('.upload-progress-bar > span').style.width = `${Math.max(0, Math.min(100, percent))}%`;
        }

        function finalizeUploadQueueItem(item, successText) {
            if (!item) return;
            updateUploadQueueItem(item, 100, successText);
            setTimeout(() => item.remove(), 1800);
        }

        async function uploadFileWithProgress({ file, pathKey, card }) {
            const item = ensureUploadQueueItem(file.name);
            const dataUrl = await fileToDataUrl(file);
            return await new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', getBackendBase() + '/api/order-files/upload');
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.upload.onprogress = (event) => {
                    if (!event.lengthComputable) return;
                    const percent = Math.round((event.loaded / event.total) * 100);
                    updateUploadQueueItem(item, percent, `${percent}% uploaded`);
                };
                xhr.onload = () => {
                    try {
                        const payload = JSON.parse(xhr.responseText || '{}');
                        if (xhr.status < 200 || xhr.status >= 300 || !payload?.ok || !payload?.url) {
                            throw new Error(payload?.error || 'File upload failed');
                        }
                        finalizeUploadQueueItem(item, 'Upload complete');
                        resolve(payload);
                    } catch (error) {
                        item.remove();
                        reject(error);
                    }
                };
                xhr.onerror = () => {
                    item.remove();
                    reject(new Error('Upload failed'));
                };
                updateUploadQueueItem(item, 8, 'Uploading...');
                xhr.send(JSON.stringify({
                    orderId,
                    clientId: clientId || card.dataset.clientId || '',
                    folderName: pathKey.replace(/\//g, '-'),
                    fileName: file.name,
                    dataUrl
                }));
            });
        }

        async function uploadFiles(files) {
            const pathKey = getCurrentPathKey();
            if (!isUploadAllowed(pathKey)) {
                alert('Open a file folder first.');
                return;
            }
            const selectedFiles = Array.from(files || []);
            if (!selectedFiles.length) return;

            const container = await loadContainer();
            const card = findCard(container);
            if (!card) return;
            const rows = getFilesForPath(card, pathKey);
            document.getElementById('saveStatus').textContent = 'Uploading...';

            for (const file of selectedFiles) {
                const payload = await uploadFileWithProgress({ file, pathKey, card });
                rows.unshift({
                    name: payload.fileName || file.name,
                    url: payload.url,
                    addedAt: new Date().toISOString()
                });
            }

            if (pathKey === 'expert/task') {
                card.dataset.questionAttachments = JSON.stringify(rows);
            } else if (pathKey === 'user') {
                card.dataset.solutionAttachments = JSON.stringify(rows);
            } else {
                const remaining = getCustomFiles(card).filter((row) => row.path !== pathKey);
                setCustomFiles(card, [...rows.map((row) => ({ ...row, path: pathKey })), ...remaining]);
            }
            await saveContainer(container, 'Files uploaded successfully.');
            await render();
        }

        async function removeItem(index) {
            const pathKey = getCurrentPathKey();
            if (!isUploadAllowed(pathKey)) return;
            const container = await loadContainer();
            const card = findCard(container);
            if (!card) return;
            const rows = getFilesForPath(card, pathKey).filter((_, itemIndex) => itemIndex !== index);
            if (pathKey === 'expert/task') {
                card.dataset.questionAttachments = JSON.stringify(rows);
            } else if (pathKey === 'user') {
                card.dataset.solutionAttachments = JSON.stringify(rows);
            } else {
                const remaining = getCustomFiles(card).filter((row) => row.path !== pathKey);
                setCustomFiles(card, [...rows.map((row) => ({ ...row, path: pathKey })), ...remaining]);
            }
            await saveContainer(container, 'File removed successfully.');
            await render();
        }

        async function createNewFolder() {
            const container = await loadContainer();
            const card = findCard(container);
            if (!card) return;
            const currentPath = getCurrentPathKey();
            const name = String(window.prompt('Folder name:', '') || '').trim();
            if (!name) return;
            if (/[\\/]/.test(name)) {
                alert('Folder name cannot contain / or \\');
                return;
            }
            const nextPath = currentPath ? `${currentPath}/${name}` : name;
            const existing = getChildFolders(card, currentPath)
                .some((folder) => String(folder.name || '').toLowerCase() === name.toLowerCase());
            if (existing) {
                alert('A folder with this name already exists here.');
                return;
            }
            const rows = getCustomFolders(card);
            rows.push({
                name,
                parentPath: currentPath,
                path: nextPath
            });
            setCustomFolders(card, rows);
            await saveContainer(container, 'Folder created successfully.');
            setActivePath(nextPath.split('/').filter(Boolean));
        }

        async function render() {
            applyTheme();
            try {
                const container = await loadContainer();
                refreshMeta(container);
                buildBreadcrumbs();
                renderFolderTree(container);
                renderFileList(container);
                updateUploadHint();
                document.getElementById('saveStatus').textContent = '';
            } catch (error) {
                document.getElementById('saveStatus').textContent = error?.message || 'Backend unreachable.';
                document.getElementById('folderTree').innerHTML = '<div class="empty">Backend unreachable. Cloud files cannot be loaded.</div>';
                document.getElementById('fileList').innerHTML = '<div class="empty">Backend unreachable. Cloud files cannot be loaded.</div>';
                updateUploadHint();
            }
        }

        document.getElementById('newFolderBtn').addEventListener('click', async () => {
            try {
                await createNewFolder();
            } catch (error) {
                document.getElementById('saveStatus').textContent = error?.message || 'Folder could not be created.';
                alert(error?.message || 'Folder could not be created.');
            }
        });

        fileInput.addEventListener('change', async function() {
            try {
                await uploadFiles(this.files || []);
            } catch (error) {
                document.getElementById('saveStatus').textContent = error?.message || 'Upload failed';
                alert(error?.message || 'Upload failed');
            } finally {
                this.value = '';
            }
        });

        ;['dragenter', 'dragover'].forEach((eventName) => {
            dropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                dropzone.classList.add('is-dragover');
            });
        });
        ;['dragleave', 'drop'].forEach((eventName) => {
            dropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                dropzone.classList.remove('is-dragover');
            });
        });
        dropzone.addEventListener('drop', async (event) => {
            try {
                await uploadFiles(event.dataTransfer?.files || []);
            } catch (error) {
                document.getElementById('saveStatus').textContent = error?.message || 'Upload failed';
                alert(error?.message || 'Upload failed');
            }
        });

        window.removeItem = removeItem;
        void render();
    </script>
</body>
</html>
