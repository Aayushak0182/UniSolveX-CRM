<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Task Folder</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5efe6;
            --panel: rgba(255,255,255,0.94);
            --text: #1f2937;
            --muted: #64748b;
            --border: rgba(148, 163, 184, 0.22);
            --brand: #4f46e5;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Segoe UI, Arial, sans-serif;
            background: linear-gradient(180deg, var(--bg), #fff);
            color: var(--text);
        }
        .wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 24px;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }
        h1, p { margin: 0; }
        .meta {
            margin-top: 8px;
            color: var(--muted);
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }
        .stat {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.82);
        }
        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            font-weight: 700;
        }
        .stat-value {
            margin-top: 6px;
            font-weight: 700;
        }
        .section-title {
            margin-top: 24px;
            margin-bottom: 12px;
            font-size: 18px;
            font-weight: 800;
        }
        .file-item {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.82);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }
        .file-title {
            font-weight: 700;
        }
        .file-meta {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 12px;
            padding: 10px 14px;
            background: var(--brand);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            white-space: nowrap;
        }
        .empty {
            border: 1px dashed var(--border);
            border-radius: 16px;
            padding: 18px;
            color: var(--muted);
            text-align: center;
        }
        @media (max-width: 720px) {
            .grid { grid-template-columns: 1fr; }
            .file-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="panel">
            <h1>Expert Task Folder</h1>
            <p id="pageMeta" class="meta">Loading task details...</p>
            <div id="taskStats" class="grid"></div>
            <h2 class="section-title">Expert &gt; Task Files</h2>
            <div id="fileList"></div>
        </div>
    </div>

    <script>
        const orderId = new URLSearchParams(window.location.search).get('orderId') || '';
        const clientId = new URLSearchParams(window.location.search).get('clientId') || '';

        function getBackendBase() {
            const hasHttpOrigin = /^https?:\/\//i.test(window.location.origin || '');
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || !hasHttpOrigin) {
                return 'http://localhost:3001';
            }
            return 'https://unisolvex-crm-backend-ra02.onrender.com';
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function parseJsonArray(raw) {
            try {
                const parsed = JSON.parse(String(raw || '[]'));
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function formatFileSize(bytes) {
            const value = Number(bytes || 0);
            if (!Number.isFinite(value) || value <= 0) return '';
            if (value < 1024) return `${value} B`;
            if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
            return `${(value / (1024 * 1024)).toFixed(1)} MB`;
        }

        function formatDate(value) {
            const date = new Date(value || '');
            if (Number.isNaN(date.getTime())) return '';
            return date.toLocaleString('en-IN', {
                day: '2-digit',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getContainerFromHtml(html) {
            const container = document.createElement('div');
            container.innerHTML = String(html || '');
            return container;
        }

        function findCard(container) {
            return Array.from(container.querySelectorAll('.order-card')).find((card) => {
                const currentOrderId = String(card.querySelector('.order-id')?.textContent || '').replace('#', '').trim();
                return currentOrderId === orderId;
            }) || null;
        }

        function getExpertTaskFiles(card, state) {
            const orderState = state?.orderAttachmentsById?.[orderId] || {};
            const questionAttachments = parseJsonArray(orderState.questionAttachments || card?.dataset?.questionAttachments || '[]');
            const customFiles = parseJsonArray(orderState.customOrderFiles || card?.dataset?.customOrderFiles || '[]')
                .filter((item) => String(item.path || '').trim().toLowerCase().startsWith('expert/task'));
            return [...questionAttachments, ...customFiles]
                .map((item) => ({
                    name: String(item.name || 'Untitled').trim() || 'Untitled',
                    url: String(item.url || '').trim(),
                    addedAt: String(item.addedAt || '').trim(),
                    sizeBytes: Number(item.sizeBytes || 0) || 0
                }))
                .filter((item) => item.url);
        }

        async function render() {
            const meta = document.getElementById('pageMeta');
            const fileList = document.getElementById('fileList');
            const taskStats = document.getElementById('taskStats');
            try {
                const response = await fetch(getBackendBase() + '/api/crm/state');
                const data = await response.json().catch(() => ({}));
                const state = data?.state && typeof data.state === 'object' ? data.state : data;
                if (!response.ok || typeof state?.orderListHtml !== 'string') {
                    throw new Error('Task details could not be loaded.');
                }
                const container = getContainerFromHtml(state.orderListHtml);
                const card = findCard(container);
                if (!card) {
                    throw new Error('Order not found.');
                }
                const title = card.querySelector('.order-title')?.textContent?.trim() || 'Untitled Task';
                const serviceType = String(card.dataset.serviceType || '').trim() || title;
                const deadline = card.querySelector('.order-expert-deadline')?.dataset.baseValue || card.querySelector('.order-expert-deadline')?.textContent?.trim() || 'TBD';
                const payout = String(card.dataset.expertPayout || card.querySelector('.order-expert-pay')?.textContent || 'TBD').trim() || 'TBD';
                const sessionStart = String(card.dataset.sessionStart || '').trim();
                const sessionDuration = String(card.dataset.sessionDuration || '').trim();
                const files = getExpertTaskFiles(card, state);

                meta.textContent = `${title} | Order #${orderId} | Client ${clientId || card.dataset.clientId || '-'}`;
                taskStats.innerHTML = `
                    <div class="stat"><div class="stat-label">Service</div><div class="stat-value">${escapeHtml(serviceType)}</div></div>
                    <div class="stat"><div class="stat-label">Order ID</div><div class="stat-value">${escapeHtml(orderId)}</div></div>
                    <div class="stat"><div class="stat-label">Date / Deadline</div><div class="stat-value">${escapeHtml(sessionStart || deadline || 'TBD')}</div></div>
                    <div class="stat"><div class="stat-label">Duration / Payout</div><div class="stat-value">${escapeHtml(sessionDuration || 'TBD')} | ${escapeHtml(payout)}</div></div>
                `;
                fileList.innerHTML = files.length
                    ? files.map((file) => `
                        <div class="file-item">
                            <div>
                                <div class="file-title">${escapeHtml(file.name)}</div>
                                <div class="file-meta">${escapeHtml([formatDate(file.addedAt), formatFileSize(file.sizeBytes)].filter(Boolean).join(' | ') || 'Task file')}</div>
                            </div>
                            <a class="btn" href="${escapeHtml(file.url)}" target="_blank" rel="noopener noreferrer">Open File</a>
                        </div>
                    `).join('')
                    : '<div class="empty">No task files are available yet in Expert > Task.</div>';
            } catch (error) {
                meta.textContent = error?.message || 'Unable to load task details.';
                taskStats.innerHTML = '';
                fileList.innerHTML = '<div class="empty">Task folder is unavailable right now.</div>';
            }
        }

        void render();
    </script>
</body>
</html>
